<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banco de Soluções | TI Interna</title>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", Arial;
  background: radial-gradient(circle at top, #000000, #0a0a0a);
  color: #f1f5f9;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 20px;
}

.wrapper {
  width: 100%;
  max-width: 900px;
}

h1 {
  text-align: center;
}

p {
  text-align: center;
  color: #9ca3af;
}

.btn {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,0,0,0.2);
  color: #f1f5f9;
  padding: 10px 14px;
  border-radius: 10px;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
}

.btn:hover {
  background: rgba(255,0,0,0.06);
  transform: translateY(-2px);
}

.card {
  background: #0b0b0b;
  border: 1px solid rgba(255,0,0,0.2);
  padding: 16px;
  border-radius: 12px;
  margin-bottom: 15px;
}

input, textarea, select {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  margin-bottom: 10px;
  background: #000;
  border: 1px solid rgba(255,0,0,0.2);
  color: #fff;
  border-radius: 8px;
}

.manual { margin-top: 10px; }

.step {
  margin-bottom: 8px;
  padding-left: 10px;
  border-left: 2px solid rgba(255,0,0,0.4);
}

.code {
  background: #000;
  border: 1px solid rgba(255,0,0,0.3);
  padding: 10px;
  border-radius: 8px;
  font-family: monospace;
  white-space: pre-wrap;
  margin: 6px 0;
}

.item {
  background: #0b0b0b;
  border: 1px solid rgba(255,0,0,0.2);
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="wrapper">

<h1>📚 Banco de Soluções TI</h1>
<p>Manual técnico estruturado automaticamente</p>

<div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-bottom:15px;">
  <button class="btn" onclick="mostrar('cad')">📝 Cadastrar</button>
  <button class="btn" onclick="mostrar('busca')">🔍 Pesquisar</button>
  <button class="btn" onclick="exportar()">💾 Exportar</button>

  <label class="btn">
    📂 Importar
    <input type="file" hidden onchange="importar(event)">
  </label>
</div>

<!-- CADASTRO -->
<div id="cad" class="card" style="display:none;">
  <label>Categoria</label>
  <select id="categoria">
    <option>Rede</option>
    <option>Servidor</option>
    <option>Impressoras</option>
    <option>Apps</option>
    <option>Comandos</option>
    <option>Outros</option>
  </select>

  <label>Problema</label>
  <input id="problema">

  <label>Solução</label>
  <textarea id="solucao" rows="6"></textarea>

  <button class="btn" onclick="salvar()">Salvar</button>
</div>

<!-- BUSCA -->
<div id="busca" class="card" style="display:none;">
  <input id="pesquisa" placeholder="Pesquisar solução..." oninput="buscar()">
</div>

<!-- LISTA -->
<div id="lista"></div>

</div>

<script>
let db;
let dados = [];
let editando = null;

const request = indexedDB.open("BancoTI", 1);

request.onupgradeneeded = e => {
  db = e.target.result;
  db.createObjectStore("solucoes", { keyPath: "id", autoIncrement: true });
};

request.onsuccess = e => {
  db = e.target.result;
  carregar();
};

function mostrar(tipo){
  document.getElementById("cad").style.display = tipo === "cad" ? "block" : "none";
  document.getElementById("busca").style.display = tipo === "busca" ? "block" : "none";
}

/* SALVAR / EDITAR */
function salvar(){
  const tx = db.transaction(["solucoes"], "readwrite");
  const store = tx.objectStore("solucoes");

  const obj = {
    categoria: categoria.value,
    problema: problema.value,
    solucao: solucao.value
  };

  if(editando){
    obj.id = editando;
    store.put(obj);
    editando = null;
  } else {
    store.add(obj);
  }

  tx.oncomplete = () => {
    carregar();
    problema.value = "";
    solucao.value = "";
  };
}

/* CARREGAR */
function carregar(){
  const tx = db.transaction(["solucoes"], "readonly");
  const store = tx.objectStore("solucoes");
  const req = store.getAll();

  req.onsuccess = () => {
    dados = req.result;
  };
}

/* MOTOR MANUAL */
function renderManual(texto){
  const linhas = texto.split("\n").filter(l => l.trim());
  let html = "";
  let step = 1;

  linhas.forEach(l => {
    if(
      l.includes("cvt") ||
      l.includes("xrandr") ||
      l.includes("sudo") ||
      l.includes("wget") ||
      l.includes("#")
    ){
      html += `<div class="code">${l}</div>`;
    }
    else {
      html += `<div class="step">${step++}. ${l}</div>`;
    }
  });

  return `<div class="manual">${html}</div>`;
}

/* BUSCAR */
function buscar(){
  const termo = pesquisa.value.toLowerCase();
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  dados.forEach(d => {
    if(
      d.problema.toLowerCase().includes(termo) ||
      d.solucao.toLowerCase().includes(termo)
    ){
      lista.innerHTML += `
        <div class="item">
          <b>Categoria:</b> ${d.categoria}<br><br>
          <b>Problema:</b> ${d.problema}<br><br>
          <b>Solução:</b>
          ${renderManual(d.solucao)}

          <br><br>

          <button class="btn" onclick="editar(${d.id})">✏ Editar</button>
          <button class="btn" onclick="excluir(${d.id})">🗑 Excluir</button>
        </div>
      `;
    }
  });
}

/* EDITAR */
function editar(id){
  const item = dados.find(d => d.id === id);

  categoria.value = item.categoria;
  problema.value = item.problema;
  solucao.value = item.solucao;

  editando = id;
  mostrar('cad');
}

/* EXCLUIR */
function excluir(id){
  if(!confirm("Excluir este registro?")) return;

  const tx = db.transaction(["solucoes"], "readwrite");
  const store = tx.objectStore("solucoes");
  store.delete(id);

  tx.oncomplete = carregar;
}

/* EXPORTAR */
function exportar(){
  const blob = new Blob([JSON.stringify(dados, null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "banco_ti.json";
  a.click();
}

/* IMPORTAR */
function importar(event){
  const file = event.target.files[0];
  const reader = new FileReader();

  reader.onload = e => {
    const json = JSON.parse(e.target.result);

    const tx = db.transaction(["solucoes"], "readwrite");
    const store = tx.objectStore("solucoes");

    json.forEach(item => {
      delete item.id;
      store.add(item);
    });

    tx.oncomplete = carregar;
  };

  reader.readAsText(file);
}
</script>

</body>
</html>
